rules:
  - id: PRIVATE_KEY
    name: private key detected
    pattern: '-----BEGIN\s+(RSA\s+)?PRIVATE\s+KEY-----'
    severity: High
    weight: 70
    hardTrigger: false
    context: any
  - id: API_KEY
    name: hardcoded api key
    # Capture group 1 = the value between quotes
    pattern: 'api[_-]?key\s*[:=]\s*[''"]([^''"]{16,})[''"]'
    severity: High
    weight: 60
    hardTrigger: false
    context: any
    # Skip env-var refs, placeholders, and obvious examples.
    excludeValuePattern: '^\$\{|^<|<.*>|your[_-]|xxx{4,}|change[_-]?me|placeholder|example|fake|dummy|test[_-]?key|TODO|FIXME|^\s*$'
    # Real keys average ~4.5+ bits/char; ban anything below 3.5.
    minValueEntropy: 3.5
  - id: PASSWORD
    name: hardcoded password
    pattern: 'password\s*[:=]\s*[''"]([^''"]{8,})[''"]'
    severity: High
    weight: 55
    hardTrigger: false
    context: any
    excludeValuePattern: '^\$\{|^<|<.*>|your[_-]|xxx{4,}|change[_-]?me|placeholder|example|fake|dummy|test[_-]?pass|password|123456|TODO|FIXME|^\s*$'
    minValueEntropy: 2.5
  - id: AWS_KEY
    name: aws access key
    pattern: '(AKIA|ASIA)[A-Z0-9]{16}'
    severity: Critical
    weight: 80
    hardTrigger: false
    context: any
  - id: GITHUB_TOKEN
    name: github token
    pattern: 'ghp_[a-zA-Z0-9]{36}'
    severity: Critical
    weight: 80
    hardTrigger: false
    context: any
  - id: JWT_TOKEN
    name: jwt token
    pattern: 'eyJ[A-Za-z0-9_-]+\.eyJ[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+'
    severity: High
    weight: 75
    hardTrigger: false
    context: any
  - id: DB_CONNECTION_STRING
    name: database connection string
    # Capture the host:port/db part; skip placeholder hosts.
    pattern: '(?:mongodb|mysql|postgres|redis)://([^\s''"<>{}]+)'
    severity: High
    weight: 70
    hardTrigger: false
    context: any
    excludeValuePattern: '^\$\{|^<|^\.\.\.|your[_-]|user:pass|user:password|host:port|placeholder|example\.com|localhost(:|/|$)|127\.0\.0\.1|0\.0\.0\.0|\.\.\.'
    minValueEntropy: 2.8
  - id: SLACK_WEBHOOK
    name: slack webhook url
    pattern: 'hooks\.slack\.com/services/[A-Z0-9/]+'
    severity: Medium
    weight: 50
    hardTrigger: false
    context: any
  - id: GENERIC_SECRET
    name: generic secret
    pattern: '(?:secret|token|key)\s*[:=]\s*[''"]([^''"]{16,})[''"]'
    severity: Medium
    weight: 45
    hardTrigger: false
    context: any
    excludeValuePattern: '^\$\{|^<|<.*>|your[_-]|xxx{4,}|change[_-]?me|placeholder|example|fake|dummy|test[_-]|TODO|FIXME|^\s*$'
    minValueEntropy: 3.5
